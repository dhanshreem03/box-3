<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box{
            width:400px;
            height:400px;
            border:1px solid;
        }
        .sbox{
            width:100px;
            height:100px;
            display: inline-block;
        }
        #red{
            background-color: red;
        }
        #green{
            background-color: green;
        }
        #blue{
            background-color: blue;
            position: relative;
            top:100px;
        }
        #orange{
            background-color: orange;
            position: relative;
            top: 200px;
        }
        #black{
            background-color: black;
            position: relative;
            top: 100px;
            left: 100px;;
        }
    </style> 
</head>
<body>
    <div class="box">
        <div class="sbox" id="red"></div>
        <div class="sbox" id="green"></div>
        <div class="sbox" id="blue"></div>
        <div class="sbox" id="orange"></div>
        <div class="sbox" id="black"></div>
    
    </div>
</body>
</html>
